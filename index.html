<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Almoxarifado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Controle de Almoxarifado</h1>

        <div class="formulario">

            <input
                type="text"
                id="input-nome"
                placeholder="Nome do material">

            <input
                type="number"
                id="input-quantidade"
                placeholder="Quantidade">

            <button id="btn-cadastrar">
                Cadastrar
            </button>

        </div>


        <div class="retirada">

            <input
                type="number"
                id="input-retirada"
                placeholder="Quantidade para retirar">

        </div>

        <div class="busca">

    <input
        type="text"
        id="input-busca"
        placeholder="Pesquisar material">

</div>

<div class="dashboard">

    <h3>
        Total de itens:
        <span id="total-itens">
            0
        </span>
    </h3>

</div>

        <!-- Cabeçalho da lista -->
<div class="cabecalho-lista">

    <span class="col-material">
        Material
    </span>

    <span class="col-quantidade">
        Quantidade
    </span>

    <span class="col-acoes">
        Ações
    </span>

</div>

<!-- Lista de materiais -->
<ol
    id="lista-materiais"
    class="lista-materiais">
</ol>

    </div>

    <script src="main.js"></script>

</body>
</html>
